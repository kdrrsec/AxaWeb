<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>AxaWeb | Jouw partner in webdesign</title>
  <meta name="description" content="AxaWeb is jouw partner in webdesign. Vertel ons over jouw project en we nemen contact op." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://axaweb.nl/" />

  <meta property="og:type" content="website" />
  <meta property="og:locale" content="nl_NL" />
  <meta property="og:site_name" content="AxaWeb" />
  <meta property="og:title" content="AxaWeb | Jouw partner in webdesign" />
  <meta property="og:description" content="AxaWeb is jouw partner in webdesign. Vertel ons over jouw project." />
  <meta property="og:url" content="https://axaweb.nl/" />

  <meta name="theme-color" content="#0B1220" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <div class="page__overlay" aria-hidden="true"></div>

    <main class="landing">
      <header class="brand">
        <img
          src="logo.png?v=5"
          srcset="logo.png?v=5 1x, logo@2x.png?v=5 2x"
          alt="AxaWeb"
          class="brand__logo"
          width="320"
          height="59"
          decoding="async"
        />
        <p class="brand__tagline">JOUW PARTNER IN WEBDESIGN.</p>
        <div class="brand__line" aria-hidden="true"></div>
      </header>

      <section class="contact" aria-labelledby="contact-title">
        <h1 id="contact-title" class="contact__title">Vertel ons over jouw project</h1>
        <p class="contact__lead">
          Vul het formulier in en we nemen zo snel mogelijk contact met je op.
        </p>

        <form class="contact-form" id="contactForm" novalidate>
          <div class="field">
            <label for="email">E-mail adres <span aria-hidden="true">*</span></label>
            <div class="field__input-wrap">
              <span class="field__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5v-11Z" stroke="currentColor" stroke-width="1.5"/>
                  <path d="m5 7 7 5.5L19 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="jouw@emailadres.nl"
                autocomplete="email"
                required
              />
            </div>
            <p class="field__error" id="emailError" hidden></p>
          </div>

          <div class="field">
            <label for="phone">Telefoonnummer <span aria-hidden="true">*</span></label>
            <div class="field__input-wrap">
              <span class="field__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M8.5 4.5h7A2.5 2.5 0 0 1 18 7v10a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 6 17V7a2.5 2.5 0 0 1 2.5-2.5Z" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M10 17h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </span>
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="06 12345678"
                autocomplete="tel"
                required
              />
            </div>
            <p class="field__error" id="phoneError" hidden></p>
          </div>

          <div class="field">
            <label for="message">Bericht <span aria-hidden="true">*</span></label>
            <div class="field__input-wrap field__input-wrap--textarea">
              <span class="field__icon field__icon--textarea" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M7 4h10a2 2 0 0 1 2 2v12l-3.5-2.5H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                  <path d="M9 8h6M9 11.5h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </span>
              <textarea
                id="message"
                name="message"
                rows="4"
                placeholder="Vertel ons over jouw project, wensen of vragen..."
                required
              ></textarea>
            </div>
            <p class="field__error" id="messageError" hidden></p>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <svg class="submit-btn__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M16.172 11H4v2h12.172l-4.95 4.95 1.414 1.414L21.207 12l-8.571-8.364-1.414 1.414 4.95 4.95Z"/>
            </svg>
            <span>Verzenden</span>
          </button>

          <p class="form-status" id="formStatus" role="status" aria-live="polite" hidden></p>
        </form>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
